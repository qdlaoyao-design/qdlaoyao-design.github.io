<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="老姚的博客 — 思考 · 记录 · 分享">
<title>老姚的博客</title>
<style>
  /* ===== Reset & Variables ===== */
  :root {
    --bg: #ffffff;
    --bg-card: #fafafa;
    --bg-card-hover: #f3f3f3;
    --border: #e8e8e8;
    --border-hover: #d4d4d4;
    --text: #444444;
    --text-heading: #111111;
    --text-muted: #888888;
    --accent: #e8960a;
    --accent-glow: rgba(232, 150, 10, 0.08);
    --tag-bg: #f0f0f0;
    --tag-text: #777777;
    --radius: 10px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    line-height: 1.7;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ===== Layout ===== */
  .container {
    max-width: 680px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ===== Navigation ===== */
  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .nav-logo {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--text-heading);
    text-decoration: none;
    letter-spacing: -0.01em;
  }

  .nav-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }

  .nav-links a {
    color: var(--text-muted);
    text-decoration: none;
    font-size: 0.9rem;
    font-weight: 500;
    transition: color 0.15s;
    padding: 4px 0;
    border-bottom: 2px solid transparent;
  }

  .nav-links a:hover,
  .nav-links a.active {
    color: var(--text-heading);
    border-bottom-color: var(--accent);
  }

  /* ===== Hero ===== */
  .hero {
    margin-bottom: 56px;
  }

  .hero h1 {
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--text-heading);
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  .hero .highlight {
    background: linear-gradient(135deg, var(--accent), #fbbf24);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 1.05rem;
    color: var(--text-muted);
    max-width: 520px;
    line-height: 1.7;
  }

  /* ===== Section Header ===== */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 28px;
  }

  .section-header h2 {
    font-size: 0.8rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== Post Cards ===== */
  .posts {
    display: flex;
    flex-direction: column;
    gap: 1px;
    background: var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 56px;
  }

  .post {
    background: var(--bg-card);
    padding: 24px 28px;
    display: flex;
    gap: 20px;
    transition: background 0.2s, transform 0.2s;
    position: relative;
    text-decoration: none;
    color: inherit;
  }

  .post:hover {
    background: var(--bg-card-hover);
  }

  .post-date {
    flex-shrink: 0;
    width: 80px;
    font-size: 0.8rem;
    color: var(--text-muted);
    padding-top: 3px;
    font-variant-numeric: tabular-nums;
  }

  .post-body {
    flex: 1;
    min-width: 0;
  }

  .post-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--text-heading);
    margin-bottom: 6px;
    line-height: 1.4;
    transition: color 0.15s;
  }

  .post:hover .post-title {
    color: var(--accent);
  }

  .post-excerpt {
    font-size: 0.9rem;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 12px;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .post-meta {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .post-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.72rem;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 4px;
    background: var(--tag-bg);
    color: var(--tag-text);
    white-space: nowrap;
  }

  .post-time {
    font-size: 0.75rem;
    color: var(--text-muted);
    white-space: nowrap;
  }

  .post-time::before {
    content: "· ";
  }

  /* ===== Footer ===== */
  .footer {
    border-top: 1px solid var(--border);
    padding: 32px 0 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 16px;
    color: var(--text-muted);
    font-size: 0.82rem;
  }

  .footer-links {
    display: flex;
    gap: 20px;
    list-style: none;
  }

  .footer-links a {
    color: var(--text-muted);
    text-decoration: none;
    transition: color 0.15s;
  }

  .footer-links a:hover {
    color: var(--text-heading);
  }

  /* ===== About Section ===== */
  .about {
    margin-bottom: 56px;
  }

  .about-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
  }

  .about-intro {
    font-size: 1.2rem;
    font-weight: 600;
    color: var(--text-heading);
    margin-bottom: 12px;
  }

  .about-detail {
    font-size: 0.92rem;
    color: var(--text-muted);
    line-height: 1.7;
    margin-bottom: 8px;
  }

  .about-detail a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 500;
  }

  .about-detail a:hover {
    text-decoration: underline;
  }

  /* ===== Responsive ===== */
  @media (max-width: 640px) {
    .hero h1 { font-size: 1.7rem; }
    .post { padding: 18px 20px; flex-direction: column; gap: 6px; }
    .post-date { width: auto; }
    .nav { padding: 16px 0; margin-bottom: 32px; }
    .hero { margin-bottom: 40px; }
  }
</style>
</head>
<body>

<div class="container">

  <!-- Navigation -->
  <nav class="nav">
    <a href="/" class="nav-logo">老姚</a>
    <ul class="nav-links">
      <li><a href="/" class="active">博客</a></li>
      <li><a href="#about">关于</a></li>
    </ul>
  </nav>

  <!-- Hero -->
  <section class="hero">
    <h1>思考<span class="highlight">·</span>记录<span class="highlight">·</span>分享</h1>
    <p>一个教育者的技术笔记。关注 AI 教学、动画制作、编程工具，用技术让学习更生动。</p>
  </section>

  <!-- Posts Section -->
  <div class="section-header">
    <h2>文章</h2>
    <div class="section-line"></div>
  </div>

  <div class="posts">

    <a href="posts/ai-cto-guide.html" class="post">
      <span class="post-date">2026.06.24</span>
      <div class="post-body">
        <div class="post-title">AI 时代 CTO 的实操指南</div>
        <p class="post-excerpt">从技术选型到团队搭建，从成本管控到安全合规——五个 CTO 必须直面的实操问题。不画饼，讲干货。</p>
        <div class="post-meta">
          <span class="post-tags">
            <span class="tag">AI</span>
            <span class="tag">技术管理</span>
            <span class="tag">CTO</span>
            <span class="tag">实操</span>
          </span>
          <span class="post-time">12 分钟阅读</span>
        </div>
      </div>
    </a>

  </div>

  <!-- About Section -->
  <section class="about" id="about">
    <div class="section-header">
      <h2>关于</h2>
      <div class="section-line"></div>
    </div>
    <div class="about-card">
      <p class="about-intro">我是老姚，<strong>AI 时代的编程者</strong>。</p>
      <p class="about-detail">关注大模型应用、AI 辅助编程与教育技术。用代码和创意探索智能时代的无限可能。</p>
      <p class="about-detail">
        GitHub：<a href="https://github.com/qdlaoyao-design">@qdlaoyao-design</a>
      </p>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <span>© 2026 老姚</span>
    <ul class="footer-links">
      <li><a href="https://github.com/qdlaoyao-design">GitHub</a></li>
    </ul>
  </footer>

</div>

</body>
</html>
